<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>pipir</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <span class="logo">pipir</span>
  <nav>
    <button data-tab="pipeline" class="tab active">Pipeline</button>
    <button data-tab="diff" class="tab">Diff</button>
    <button data-tab="pr" class="tab">PR</button>
    <button data-tab="chat" class="tab">Chat</button>
  </nav>
</header>

<main id="tab-pipeline" class="pane active">
  <div class="toolbar">
    <select id="file-select"></select>
    <button id="annotate-btn" title="Generate one-line node notes via the configured LLM">✨ Annotate</button>
    <label class="chk"><input type="checkbox" id="show-notes" checked> notes</label>
    <span id="pipeline-msg" class="msg"></span>
  </div>
  <div class="split">
    <div id="canvas-wrap"><svg id="canvas"></svg></div>
    <aside id="side">
      <div id="side-empty" class="dim">Select a node — or browse the findings below.</div>
      <div id="node-detail" hidden>
        <h2 id="node-title"></h2>
        <div id="node-note" class="note"></div>
        <pre id="node-block"></pre>
      </div>
      <div id="findings"></div>
    </aside>
  </div>
</main>

<main id="tab-diff" class="pane">
  <div class="toolbar">
    <select id="diff-a"></select>
    <span>→</span>
    <select id="diff-b"></select>
    <button id="diff-btn">Compare</button>
    <span id="diff-msg" class="msg"></span>
  </div>
  <div id="diff-out"></div>
</main>

<main id="tab-pr" class="pane">
  <div class="toolbar">
    <input id="pr-repo" placeholder="/path/to/local/clone" size="34">
    <input id="pr-num" placeholder="PR #" size="6">
    <button id="pr-btn">Load PR</button>
    <span id="pr-msg" class="msg"></span>
  </div>
  <div id="pr-out"></div>
</main>

<main id="tab-chat" class="pane">
  <div class="toolbar">
    <select id="chat-file"></select>
    <span id="chat-msg" class="msg"></span>
  </div>
  <div id="chat-log"></div>
  <form id="chat-form">
    <textarea id="chat-input" rows="2"
      placeholder="Ask about this pipeline… (Enter to send, Shift+Enter for newline)"></textarea>
    <button type="submit">Send</button>
  </form>
</main>

<script src="app.js"></script>
</body>
</html>
